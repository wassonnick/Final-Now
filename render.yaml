services:
  # Frontend (React + Vite)
  - type: web
    name: societyflats-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://final-now.onrender.com/api
    routes:
      # Live registry sitemap, proxied onto the site's own domain. GSC only accepts
      # sitemap URLs inside the verified property (sc-domain:societyflats.com), so the
      # backend URL can't be submitted directly — this rewrite serves it same-host.
      - type: rewrite
        source: /sitemap-live.xml
        destination: https://final-now.onrender.com/api/seo/sitemap.xml

      # C33 static SEO HTML rewrites. Keep these above the SPA fallback.
      - type: rewrite
        source: /gurgaon
        destination: /gurgaon/index.html
      - type: rewrite
        source: /gurgaon/societies
        destination: /gurgaon/societies/index.html
      - type: rewrite
        source: /gurgaon/properties
        destination: /gurgaon/properties/index.html
      - type: rewrite
        source: /gurgaon/sector-56
        destination: /gurgaon/sector-56/index.html
      - type: rewrite
        source: /gurgaon/sector-65
        destination: /gurgaon/sector-65/index.html
      - type: rewrite
        source: /gurgaon/sector-66
        destination: /gurgaon/sector-66/index.html
      - type: rewrite
        source: /gurgaon/sector-67
        destination: /gurgaon/sector-67/index.html
      - type: rewrite
        source: /gurgaon/sector-70
        destination: /gurgaon/sector-70/index.html
      - type: rewrite
        source: /gurgaon/sector-102
        destination: /gurgaon/sector-102/index.html
      - type: rewrite
        source: /gurgaon/golf-course-road
        destination: /gurgaon/golf-course-road/index.html
      - type: rewrite
        source: /gurgaon/golf-course-extension-road
        destination: /gurgaon/golf-course-extension-road/index.html
      - type: rewrite
        source: /gurgaon/dwarka-expressway
        destination: /gurgaon/dwarka-expressway/index.html
      - type: rewrite
        source: /gurgaon/sohna-road
        destination: /gurgaon/sohna-road/index.html
      - type: rewrite
        source: /builder/dlf
        destination: /builder/dlf/index.html
      - type: rewrite
        source: /builder/m3m
        destination: /builder/m3m/index.html
      - type: rewrite
        source: /builder/emaar
        destination: /builder/emaar/index.html
      - type: rewrite
        source: /builder/ats
        destination: /builder/ats/index.html
      - type: rewrite
        source: /builder/godrej
        destination: /builder/godrej/index.html
      - type: rewrite
        source: /builder/adani
        destination: /builder/adani/index.html
      - type: rewrite
        source: /builder/tulip
        destination: /builder/tulip/index.html
      - type: rewrite
        source: /builder/alpha-corp
        destination: /builder/alpha-corp/index.html
      - type: rewrite
        source: /societies
        destination: /societies/index.html
      - type: rewrite
        source: /properties
        destination: /properties/index.html
      - type: rewrite
        source: /broker-crm
        destination: /broker-crm/index.html
      - type: rewrite
        source: /recommendations
        destination: /recommendations/index.html

      - type: rewrite
        source: /builder-floors
        destination: /builder-floors/index.html
      - type: rewrite
        source: /builder-portal
        destination: /builder-portal/index.html
      - type: rewrite
        source: /chat
        destination: /chat/index.html
      - type: rewrite
        source: /help
        destination: /help/index.html
      - type: rewrite
        source: /investment-calculator
        destination: /investment-calculator/index.html
      - type: rewrite
        source: /nri-services
        destination: /nri-services/index.html
      - type: rewrite
        source: /privacy
        destination: /privacy/index.html
      - type: rewrite
        source: /trust
        destination: /trust/index.html
      - type: rewrite
        source: /404
        destination: /404/index.html

      # SPA fallback for admin, dynamic society/property pages, search and other React routes.
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend (Laravel)
  - type: web
    name: societyflats-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_NAME
        value: SocietyFlats
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://final-now.onrender.com
      - key: FRONTEND_URL
        value: https://www.societyflats.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: societyflats-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: societyflats-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: societyflats-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: societyflats-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: societyflats-db
          property: password
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: MEILISEARCH_HOST
        value: ""
      - key: MEILISEARCH_KEY
        value: ""
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: AI_IMPORT_PROVIDER
        value: gemini
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: GOOGLE_SEARCH_CONSOLE_SITE_URL
        value: https://www.societyflats.com
      - key: GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_SEARCH_CONSOLE_CLIENT_ID
        sync: false
      - key: GOOGLE_SEARCH_CONSOLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SEARCH_CONSOLE_REFRESH_TOKEN
        sync: false
      - key: META_CONNECT_SCOPES
        value: public_profile,pages_show_list,pages_read_engagement,business_management
      - key: META_PUBLISH_SCOPES
        value: pages_manage_posts,pages_manage_engagement,instagram_basic,instagram_content_publish
      - key: UPLOADS_DISK
        value: r2
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  # Scheduler worker. Queue delivery is synchronous; this process runs due alert matching.
  - type: worker
    name: societyflats-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    startCommand: php artisan schedule:work
    envVars:
      - key: APP_NAME
        value: SocietyFlats
      - key: APP_ENV
        value: production
      - key: APP_KEY
        fromService:
          name: societyflats-api
          type: web
          envVarKey: APP_KEY
      - key: FRONTEND_URL
        value: https://www.societyflats.com
      - key: GOOGLE_SEARCH_CONSOLE_SITE_URL
        value: https://www.societyflats.com
      - key: GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_SEARCH_CONSOLE_CLIENT_ID
        sync: false
      - key: GOOGLE_SEARCH_CONSOLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SEARCH_CONSOLE_REFRESH_TOKEN
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: societyflats-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: societyflats-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: societyflats-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: societyflats-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: societyflats-db
          property: password

databases:
  - name: societyflats-db
    databaseName: societyflats
    user: societyflats
    plan: free
    ipAllowList: []
